<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E3B35">
<link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nivaa Admin">
<meta name="robots" content="noindex,nofollow">
<title>Analytics · Nivaa Stays</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tailwind.css?v=eebcf5ac">
<link rel="stylesheet" href="css/styles.css?v=b3b6aa37">
<link rel="stylesheet" href="css/app.css?v=8115e0b0">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-cream">

<header class="sticky-nav">
  <div class="max-w-7xl mx-auto px-4 sm:px-5 py-2 sm:py-3 flex items-center justify-between gap-2">
    <a href="index.html" class="flex items-center gap-2 sm:gap-3 min-w-0">
      <img src="assets/logo.png" alt="Nivaa Stays" class="h-10 w-10 sm:h-12 sm:w-12 rounded-full object-cover bg-teal-dark flex-shrink-0">
      <div class="min-w-0">
        <div class="text-white serif text-base sm:text-lg leading-tight truncate">Nivaa Stays</div>
        <div class="hidden sm:block text-gold text-[10px] tracking-[0.22em] uppercase">Admin · Analytics</div>
      </div>
    </a>
    <nav class="flex items-center gap-1">
      <a href="admin.html" class="nav-link hidden md:inline">Bookings</a>
      <a href="admin-rank.html" class="nav-link hidden md:inline">Rank tracker</a>
      <a href="admin-competitors.html" class="nav-link hidden md:inline">Competitors</a>
      <span id="admin-user-chip" class="hidden md:inline text-white/80 text-xs px-2"></span>
      <button id="logout-btn" class="nav-link hidden">Logout</button>
      <button id="refresh-btn" class="btn-gold ml-1 sm:ml-3 text-xs sm:text-sm px-3 sm:px-4 py-2 hidden">Refresh</button>
    </nav>
  </div>
</header>

<section class="section" style="padding-top: 6rem; padding-bottom: 2rem;">
  <div class="max-w-6xl mx-auto px-4 sm:px-5">
    <div class="text-center mb-6">
      <div class="eyebrow">Monthly Analytics</div>
      <div class="divider-gold divider-center"></div>
      <h1 class="serif text-3xl md:text-4xl text-teal mb-2">Booking analytics</h1>
      <p class="text-[color:var(--brand-muted)] text-sm" id="generated-line"></p>
    </div>

    <!-- Login gate (shown when not signed in as admin) -->
    <div id="admin-login" class="hidden bg-cream rounded-2xl p-8 text-center max-w-md mx-auto" style="border:1px dashed var(--brand-gold);">
      <div class="serif text-2xl text-teal mb-2">Admin sign-in</div>
      <p class="text-[color:var(--brand-muted)] text-sm mb-6">Sign in with the Nivaa Stays Google account to view booking analytics.</p>
      <div id="g-signin-btn" class="flex justify-center"></div>
      <p id="login-error" class="text-xs mt-4" style="color:#c45a3a; min-height:1em;"></p>
    </div>

    <!-- Dashboard (shown when signed in as admin) -->
    <div id="analytics-dashboard" class="hidden">
      <div id="kpi-cards" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8"></div>
      <div class="grid md:grid-cols-3 gap-5 mb-8">
        <div class="md:col-span-2 bg-white rounded-2xl p-4 sm:p-5 border border-[#e8ebe8]">
          <div class="text-xs uppercase tracking-[0.16em] text-[color:var(--brand-muted)] mb-3">Revenue &amp; occupancy</div>
          <div style="position:relative; height:300px;"><canvas id="chart-revenue"></canvas></div>
        </div>
        <div class="bg-white rounded-2xl p-4 sm:p-5 border border-[#e8ebe8]">
          <div class="text-xs uppercase tracking-[0.16em] text-[color:var(--brand-muted)] mb-3">Channel mix (revenue)</div>
          <div style="position:relative; height:300px;"><canvas id="chart-channel"></canvas></div>
        </div>
      </div>
      <div id="extra-cards" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8"></div>
      <div id="monthly-table"></div>
    </div>
  </div>
</section>

<footer class="bg-teal-dark text-white/70 text-xs py-6" style="background: #082623;">
  <div class="max-w-7xl mx-auto px-5 text-center">© <span id="y"></span> Nivaa Stays · <a href="admin.html" class="underline">Bookings</a> · <a href="index.html" class="underline">Site</a></div>
</footer>

<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
<script src="js/auth.js?v=4aee52df"></script>
<script src="js/analytics.js?v=f3457253"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
