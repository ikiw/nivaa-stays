<script>
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const gimgs = [...document.querySelectorAll('#galMason img')];
  let gi = 0;
  function lbShow(i) { gi = (i + gimgs.length) % gimgs.length; lbImg.src = gimgs[gi].src; lbImg.alt = gimgs[gi].alt; }
  function lbOpen(i) { lbShow(i); lb.classList.add('open'); }
  function lbHide() { lb.classList.remove('open'); }
  gimgs.forEach((img, i) => img.addEventListener('click', () => lbOpen(i)));
  document.getElementById('lbClose').addEventListener('click', lbHide);
  document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); lbShow(gi - 1); });
  document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); lbShow(gi + 1); });
  lb.addEventListener('click', e => { if (e.target === lb) lbHide(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') lbHide();
    else if (e.key === 'ArrowLeft') lbShow(gi - 1);
    else if (e.key === 'ArrowRight') lbShow(gi + 1);
  });
  // swipe left/right on touch to move between images
  let lbX = null;
  lb.addEventListener('touchstart', e => { lbX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    if (lbX === null) return;
    const dx = e.changedTouches[0].clientX - lbX; lbX = null;
    if (Math.abs(dx) > 45) lbShow(gi + (dx < 0 ? 1 : -1));
  }, { passive: true });
</script>
