<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E3B35">
<link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nivaa Admin">
<meta name="robots" content="noindex,nofollow">
<title>Admin · Nivaa Stays</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tailwind.css?v=e9c82af5">
<link rel="stylesheet" href="css/styles.css?v=60f6512b">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-cream">

<header class="sticky-nav">
  <div class="max-w-7xl mx-auto px-4 sm:px-5 py-2 sm:py-3 flex items-center justify-between gap-2">
    <a href="index.html" class="flex items-center gap-2 sm:gap-3 min-w-0">
      <img src="assets/logo.png" alt="Nivaa Stays" class="h-10 w-10 sm:h-12 sm:w-12 rounded-full object-cover bg-teal-dark flex-shrink-0">
      <div class="min-w-0">
        <div class="text-white serif text-base sm:text-lg leading-tight truncate">Nivaa Stays</div>
        <div class="hidden sm:block text-gold text-[10px] tracking-[0.22em] uppercase">Admin · Daily Ops</div>
      </div>
    </a>
    <nav class="flex items-center gap-1">
      <a href="admin-rank.html" class="nav-link hidden md:inline">Rank tracker</a>
      <a href="admin-competitors.html" class="nav-link hidden md:inline">Competitors</a>
      <a href="booking.html" class="nav-link hidden md:inline">Quote builder</a>
      <a href="receipt.html" class="nav-link hidden md:inline">Receipt</a>
      <span id="admin-user-chip" class="hidden md:inline text-white/80 text-xs px-2"></span>
      <button id="install-btn" class="nav-link hidden" title="Install Nivaa Admin app">📲 Install</button>
      <button id="logout-btn" class="nav-link hidden">Logout</button>
      <button id="refresh-btn" class="btn-gold ml-1 sm:ml-3 text-xs sm:text-sm px-3 sm:px-4 py-2 hidden">Refresh</button>
    </nav>
  </div>
</header>

<section class="section" style="padding-top: 6rem; padding-bottom: 2rem;">
  <div class="max-w-5xl mx-auto px-4 sm:px-5">
    <div class="text-center mb-6">
      <div class="eyebrow">Today's Ops</div>
      <div class="divider-gold divider-center"></div>
      <h1 class="serif text-3xl md:text-4xl text-teal mb-2">Bookings dashboard</h1>
      <p class="text-[color:var(--brand-muted)] text-sm" id="date-line"></p>
    </div>

    <!-- Login gate (shown when not signed in as admin) -->
    <div id="admin-login" class="hidden bg-cream rounded-2xl p-8 text-center max-w-md mx-auto" style="border:1px dashed var(--brand-gold);">
      <div class="serif text-2xl text-teal mb-2">Admin sign-in</div>
      <p class="text-[color:var(--brand-muted)] text-sm mb-6">Sign in with the Nivaa Stays Google account to view today's bookings and add charges to a guest's hub.</p>
      <div id="g-signin-btn" class="flex justify-center"></div>
      <p id="login-error" class="text-xs mt-4" style="color:#c45a3a; min-height:1em;"></p>
    </div>

    <!-- Dashboard (shown when signed in as admin) -->
    <div id="admin-dashboard" class="hidden">
      <div id="admin-summary" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8"></div>
      <div id="admin-content"></div>
    </div>
  </div>
</section>

<footer class="bg-teal-dark text-white/70 text-xs py-6" style="background: #082623;">
  <div class="max-w-7xl mx-auto px-5 text-center">© <span id="y"></span> Nivaa Stays · <a href="index.html" class="underline">Site</a> · <a href="booking.html?mode=admin" class="underline">Quote builder</a> · <a href="receipt.html?mode=admin" class="underline">Receipt</a></div>
</footer>

<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
<script src="js/auth.js?v=4aee52df"></script>
<script src="js/admin.js?v=80118cac"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
